<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dropvlt</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500&family=Geist+Mono:wght@300;400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fafaf9;
    --surface: #ffffff;
    --border: #e5e5e3;
    --border-strong: #d4d4d0;
    --text: #1a1a18;
    --muted: #8a8a85;
    --subtle: #f5f5f3;
    --mono: 'Geist Mono', monospace;
    --sans: 'Geist', sans-serif;
    --radius: 10px;
  }

  body { background: var(--bg); color: var(--text); font-family: var(--sans); font-weight: 400; min-height: 100vh; -webkit-font-smoothing: antialiased; }

  header {
    padding: 1.5rem 2.5rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    gap: 0.75rem;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .logo { font-family: var(--mono); font-size: 0.9rem; color: var(--text); text-decoration: none; }

  .sep { color: var(--border-strong); font-size: 1rem; font-weight: 300; }

  .bc-current { font-family: var(--mono); font-size: 0.9rem; color: var(--muted); }

  main { padding: 3rem 2.5rem; max-width: 860px; }

  .page-title { font-size: 0.72rem; font-family: var(--mono); color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 1.5rem; }

  .file-list {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .file-row {
    display: flex;
    align-items: center;
    padding: 0.9rem 1.25rem;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    text-decoration: none;
    gap: 1rem;
    transition: background 0.1s;
  }

  .file-row:last-child { border-bottom: none; }
  .file-row:hover { background: var(--subtle); }

  .file-icon {
    width: 30px;
    height: 30px;
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .file-icon svg { width: 15px; height: 15px; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; fill: none; }

  .icon-pdf { background: #fff1f0; }
  .icon-pdf svg { stroke: #e5434a; }
  .icon-image { background: #f0f7ff; }
  .icon-image svg { stroke: #3b82f6; }
  .icon-youtube { background: #fff4f0; }
  .icon-youtube svg { stroke: #f97316; }
  .icon-doc { background: #f0fdf4; }
  .icon-doc svg { stroke: #22c55e; }
  .icon-file { background: var(--subtle); }
  .icon-file svg { stroke: var(--muted); }

  .file-name { font-size: 0.875rem; color: var(--text); flex: 1; font-weight: 400; }

  .file-badge {
    font-family: var(--mono);
    font-size: 0.58rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.2rem 0.5rem;
    border-radius: 4px;
    background: var(--subtle);
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .file-meta { font-family: var(--mono); font-size: 0.65rem; color: var(--muted); min-width: 80px; text-align: right; }

  .arrow { color: var(--border-strong); font-size: 0.75rem; transition: color 0.1s; }
  .file-row:hover .arrow { color: var(--muted); }

  .empty { padding: 4rem 0; text-align: center; color: var(--muted); font-family: var(--mono); font-size: 0.75rem; }
  .spinner { width: 20px; height: 20px; border: 1.5px solid var(--border); border-top-color: var(--muted); border-radius: 50%; animation: spin 0.6s linear infinite; margin: 3rem auto; }
  @keyframes spin { to { transform: rotate(360deg); } }

  footer { position: fixed; bottom: 0; left: 0; right: 0; padding: 0.75rem 2.5rem; border-top: 1px solid var(--border); background: rgba(250,250,249,0.9); backdrop-filter: blur(8px); font-family: var(--mono); font-size: 0.65rem; color: var(--muted); display: flex; justify-content: space-between; }
</style>
</head>
<body>

<header>
  <a href="index.html" class="logo">dropvlt</a>
  <span class="sep">/</span>
  <span class="bc-current" id="bc-folder"></span>
</header>

<main>
  <div class="page-title">files</div>
  <div class="file-list" id="file-list"><div class="spinner"></div></div>
</main>

<footer>
  <span id="footer-folder"></span>
  <span id="footer-count"></span>
</footer>

<script>
  const params = new URLSearchParams(location.search);
  const folderName = params.get('f') || '';
  document.getElementById('bc-folder').textContent = folderName;
  document.getElementById('footer-folder').textContent = folderName;
  document.title = `dropvlt — ${folderName}`;

  const ICONS = {
    pdf: `<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`,
    image: `<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`,
    youtube: `<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>`,
    doc: `<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>`,
    file: `<svg viewBox="0 0 24 24"><path d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>`
  };

  fetch('manifest.json?v=' + Date.now())
    .then(r => r.json())
    .then(data => {
      const project = (data.projects || []).find(p => p.name === folderName);
      const list = document.getElementById('file-list');

      if (!project || project.files.length === 0) {
        list.innerHTML = '<div class="empty">no files in this folder</div>';
        return;
      }

      list.innerHTML = '';
      project.files.forEach(f => {
        const iconClass = `icon-${['pdf','image','youtube','doc'].includes(f.type) ? f.type : 'file'}`;
        const icon = ICONS[['pdf','image','youtube','doc'].includes(f.type) ? f.type : 'file'];
        const a = document.createElement('a');
        a.className = 'file-row';
        a.href = `viewer.html?f=${encodeURIComponent(folderName)}&file=${encodeURIComponent(f.name)}&type=${f.type}`;
        a.innerHTML = `
          <div class="file-icon ${iconClass}">${icon}</div>
          <span class="file-name">${f.name}</span>
          <span class="file-badge">${f.type}</span>
          <span class="file-meta">${f.size}</span>
          <span class="arrow">›</span>
        `;
        list.appendChild(a);
      });

      document.getElementById('footer-count').textContent = `${project.files.length} file${project.files.length !== 1 ? 's' : ''}`;
    });
</script>
</body>
</html>
