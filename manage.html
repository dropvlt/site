<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dropvlt — manage</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500&family=Geist+Mono:wght@300;400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fafaf9;
    --surface: #ffffff;
    --border: #e5e5e3;
    --border-strong: #d4d4d0;
    --text: #1a1a18;
    --muted: #8a8a85;
    --subtle: #f5f5f3;
    --accent: #1a1a18;
    --danger: #e5434a;
    --danger-bg: #fff1f0;
    --mono: 'Geist Mono', monospace;
    --sans: 'Geist', sans-serif;
    --radius: 10px;
  }

  body { background: var(--bg); color: var(--text); font-family: var(--sans); font-weight: 400; min-height: 100vh; -webkit-font-smoothing: antialiased; }

  /* ── Auth gate ── */
  #auth-gate { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 2.5rem; width: 100%; max-width: 360px; text-align: center; }
  .auth-logo { font-family: var(--mono); font-size: 1rem; color: var(--text); margin-bottom: 0.5rem; }
  .auth-sub { font-size: 0.8rem; color: var(--muted); margin-bottom: 2rem; }
  .auth-input { width: 100%; padding: 0.75rem 1rem; border: 1px solid var(--border); border-radius: 8px; font-family: var(--mono); font-size: 0.85rem; color: var(--text); background: var(--surface); margin-bottom: 0.75rem; transition: border-color 0.12s; text-align: center; letter-spacing: 0.05em; }
  .auth-input:focus { outline: none; border-color: var(--border-strong); }
  .auth-input::placeholder { color: var(--muted); letter-spacing: 0; }
  .auth-btn { width: 100%; padding: 0.75rem; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-family: var(--sans); font-size: 0.875rem; font-weight: 500; cursor: pointer; transition: opacity 0.15s; }
  .auth-btn:hover { opacity: 0.85; }
  .auth-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .auth-error { font-family: var(--mono); font-size: 0.72rem; color: var(--danger); margin-top: 0.75rem; min-height: 1em; }

  /* ── App ── */
  #app { display: none; }

  header { padding: 1.5rem 2.5rem; border-bottom: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  .logo { font-family: var(--mono); font-size: 0.9rem; color: var(--text); text-decoration: none; }
  .header-right { display: flex; align-items: center; gap: 0.75rem; }

  .btn {
    font-family: var(--mono); font-size: 0.65rem; letter-spacing: 0.05em;
    color: var(--muted); background: var(--subtle); border: 1px solid var(--border);
    padding: 0.4rem 0.85rem; border-radius: 6px; cursor: pointer;
    text-decoration: none; transition: all 0.12s; white-space: nowrap;
  }
  .btn:hover { border-color: var(--border-strong); color: var(--text); background: var(--surface); }
  .btn-dark { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-dark:hover { opacity: 0.85; color: #fff; background: var(--accent); border-color: var(--accent); }
  .btn-danger { color: var(--danger); border-color: #fecaca; background: var(--danger-bg); }
  .btn-danger:hover { border-color: var(--danger); background: #ffe4e4; color: var(--danger); }
  .btn:disabled, button:disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }

  main { padding: 2.5rem; max-width: 820px; }

  .page-title { font-size: 0.72rem; font-family: var(--mono); color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 1.5rem; }

  .top-actions { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.75rem; }

  /* ── Folder card ── */
  .folder-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 1rem;
    overflow: hidden;
  }

  .folder-header {
    display: flex; align-items: center; gap: 0.75rem;
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--border);
    background: var(--subtle);
  }

  .folder-name-display {
    font-size: 0.875rem; font-weight: 500; flex: 1;
  }

  .folder-name-input {
    font-family: var(--mono); font-size: 0.85rem; color: var(--text);
    background: var(--surface); border: 1px solid var(--border-strong);
    border-radius: 6px; padding: 0.3rem 0.6rem; flex: 1;
    display: none;
  }
  .folder-name-input:focus { outline: none; border-color: var(--accent); }

  .folder-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }

  /* ── File rows ── */
  .file-row {
    display: flex; align-items: center; gap: 1rem;
    padding: 0.75rem 1.25rem; border-bottom: 1px solid var(--border);
  }
  .file-row:last-child { border-bottom: none; }

  .file-ext {
    font-family: var(--mono); font-size: 0.58rem; letter-spacing: 0.08em;
    text-transform: uppercase; padding: 0.2rem 0.5rem; border-radius: 4px;
    background: var(--subtle); color: var(--muted); border: 1px solid var(--border);
    flex-shrink: 0;
  }

  .file-name { font-size: 0.875rem; flex: 1; }

  .file-size { font-family: var(--mono); font-size: 0.65rem; color: var(--muted); flex-shrink: 0; }

  .empty-folder { padding: 1.5rem 1.25rem; font-family: var(--mono); font-size: 0.72rem; color: var(--muted); }

  /* ── New folder modal ── */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.3);
    display: none; align-items: center; justify-content: center; z-index: 100;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 2rem; width: 100%; max-width: 380px;
  }
  .modal-title { font-size: 0.875rem; font-weight: 500; margin-bottom: 1.25rem; }
  .modal-input {
    width: 100%; padding: 0.65rem 0.9rem; border: 1px solid var(--border);
    border-radius: 8px; font-family: var(--mono); font-size: 0.85rem;
    color: var(--text); background: var(--surface); margin-bottom: 1rem;
  }
  .modal-input:focus { outline: none; border-color: var(--border-strong); }
  .modal-actions { display: flex; gap: 0.75rem; justify-content: flex-end; }
  .modal-error { font-family: var(--mono); font-size: 0.7rem; color: var(--danger); margin-bottom: 0.75rem; min-height: 1em; }

  /* ── Spinner ── */
  .spinner { width: 16px; height: 16px; border: 1.5px solid var(--border); border-top-color: var(--muted); border-radius: 50%; animation: spin 0.6s linear infinite; margin: 3rem auto; }
  .spinner-inline { width: 12px; height: 12px; border: 1.5px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; display: inline-block; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .toast {
    position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
    background: var(--accent); color: #fff; font-family: var(--mono);
    font-size: 0.72rem; padding: 0.6rem 1.25rem; border-radius: 8px;
    opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 200;
  }
  .toast.show { opacity: 1; }

  footer { padding: 0.75rem 2.5rem; border-top: 1px solid var(--border); background: rgba(250,250,249,0.9); backdrop-filter: blur(8px); font-family: var(--mono); font-size: 0.65rem; color: var(--muted); display: flex; justify-content: space-between; }
</style>
</head>
<body>

<!-- Auth gate -->
<div id="auth-gate">
  <div class="auth-card">
    <div class="auth-logo">dropvlt</div>
    <div class="auth-sub">manage folders & files</div>
    <input type="password" class="auth-input" id="password-input" placeholder="enter password" autocomplete="current-password">
    <button class="auth-btn" id="login-btn">log in</button>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<!-- App -->
<div id="app">
  <header>
    <a href="index.html" class="logo">dropvlt</a>
    <div class="header-right">
      <a href="upload/index.html" class="btn">↑ upload</a>
      <button class="btn" id="logout-btn">log out</button>
    </div>
  </header>

  <main>
    <div class="page-title">manage</div>

    <div class="top-actions">
      <button class="btn btn-dark" id="new-folder-btn">+ new folder</button>
      <button class="btn" id="refresh-btn">↺ refresh</button>
    </div>

    <div id="folders-list"><div class="spinner"></div></div>
  </main>

  <footer>
    <span>dropvlt</span>
    <span id="footer-date"></span>
  </footer>
</div>

<!-- New folder modal -->
<div class="modal-backdrop" id="modal">
  <div class="modal">
    <div class="modal-title">new folder</div>
    <input type="text" class="modal-input" id="modal-input" placeholder="folder name">
    <div class="modal-error" id="modal-error"></div>
    <div class="modal-actions">
      <button class="btn" id="modal-cancel">cancel</button>
      <button class="btn btn-dark" id="modal-confirm">create</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  document.getElementById('footer-date').textContent = new Date().toISOString().split('T')[0];

  let sessionPassword = null;

  // ── Auth ──────────────────────────────────────────────────────────────────
  async function attemptLogin(password) {
    const btn   = document.getElementById('login-btn');
    const errEl = document.getElementById('auth-error');
    btn.disabled = true;
    errEl.textContent = '';

    try {
      const res = await fetch('/api/upload', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Upload-Password': password },
        body: JSON.stringify({ probe: true })
      });
      if (res.ok) {
        sessionPassword = password;
        showApp();
      } else {
        errEl.textContent = 'incorrect password';
      }
    } catch {
      errEl.textContent = 'connection error';
    } finally {
      btn.disabled = false;
    }
  }

  function showApp() {
    document.getElementById('auth-gate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadFolders();
  }

  function logout() {
    sessionPassword = null;
    document.getElementById('auth-gate').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    document.getElementById('password-input').value = '';
  }

  document.getElementById('login-btn').addEventListener('click', () => {
    attemptLogin(document.getElementById('password-input').value.trim());
  });
  document.getElementById('password-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') attemptLogin(document.getElementById('password-input').value.trim());
  });
  document.getElementById('logout-btn').addEventListener('click', logout);

  // ── API helpers ───────────────────────────────────────────────────────────
  async function api(action, body) {
    const isGet = !body;
    const res = await fetch(`/api/manage?action=${action}`, {
      method: isGet ? 'GET' : 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Upload-Password': sessionPassword
      },
      ...(isGet ? {} : { body: JSON.stringify({ action, ...body }) })
    });
    if (res.status === 401) { logout(); throw new Error('unauthorized'); }
    return res.json();
  }

  // ── Toast ─────────────────────────────────────────────────────────────────
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2200);
  }

  // ── Format file size ──────────────────────────────────────────────────────
  function fmt(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  }

  // ── Render ────────────────────────────────────────────────────────────────
  function renderFolders(projects) {
    const container = document.getElementById('folders-list');
    if (!projects.length) {
      container.innerHTML = '<div style="font-family:var(--mono);font-size:0.75rem;color:var(--muted);padding:3rem 0;text-align:center;">no folders yet</div>';
      return;
    }

    container.innerHTML = '';
    projects.forEach(project => {
      const card = document.createElement('div');
      card.className = 'folder-card';
      card.dataset.name = project.name;

      const fileRows = project.files.map(f => `
        <div class="file-row" data-path="${f.path}" data-sha="${f.sha}">
          <span class="file-ext">${f.name.split('.').pop()}</span>
          <span class="file-name">${f.name}</span>
          <span class="file-size">${fmt(f.size)}</span>
          <button class="btn btn-danger delete-file-btn" style="font-size:0.6rem;padding:0.3rem 0.65rem;">delete</button>
        </div>
      `).join('');

      card.innerHTML = `
        <div class="folder-header">
          <span class="folder-name-display">${project.name}</span>
          <input type="text" class="folder-name-input" value="${project.name}">
          <div class="folder-actions">
            <button class="btn rename-btn">rename</button>
            <button class="btn rename-save-btn btn-dark" style="display:none">save</button>
            <button class="btn rename-cancel-btn" style="display:none">cancel</button>
            <a href="upload/index.html?folder=${encodeURIComponent(project.name)}" class="btn">+ add files</a>
            <button class="btn btn-danger delete-folder-btn">delete folder</button>
          </div>
        </div>
        <div class="file-rows">
          ${fileRows || '<div class="empty-folder">no files</div>'}
        </div>
      `;

      // Rename logic
      const nameDisplay = card.querySelector('.folder-name-display');
      const nameInput   = card.querySelector('.folder-name-input');
      const renameBtn   = card.querySelector('.rename-btn');
      const saveBtn     = card.querySelector('.rename-save-btn');
      const cancelBtn   = card.querySelector('.rename-cancel-btn');

      renameBtn.addEventListener('click', () => {
        nameDisplay.style.display = 'none';
        nameInput.style.display = 'block';
        nameInput.focus();
        nameInput.select();
        renameBtn.style.display = 'none';
        saveBtn.style.display = '';
        cancelBtn.style.display = '';
      });

      cancelBtn.addEventListener('click', () => {
        nameDisplay.style.display = '';
        nameInput.style.display = 'none';
        nameInput.value = project.name;
        renameBtn.style.display = '';
        saveBtn.style.display = 'none';
        cancelBtn.style.display = 'none';
      });

      saveBtn.addEventListener('click', async () => {
        const newName = nameInput.value.trim();
        if (!newName || newName === project.name) { cancelBtn.click(); return; }
        saveBtn.disabled = true;
        saveBtn.innerHTML = '<span class="spinner-inline"></span>';
        try {
          await api('rename-folder', { oldName: project.name, newName });
          toast(`renamed to "${newName}"`);
          loadFolders();
        } catch (e) {
          toast('rename failed');
          saveBtn.disabled = false;
          saveBtn.textContent = 'save';
        }
      });

      // Delete folder
      card.querySelector('.delete-folder-btn').addEventListener('click', async (e) => {
        const btn = e.currentTarget;
        if (btn.dataset.confirm !== '1') {
          btn.textContent = 'sure?';
          btn.dataset.confirm = '1';
          setTimeout(() => { btn.textContent = 'delete folder'; btn.dataset.confirm = ''; }, 3000);
          return;
        }
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-inline"></span>';
        try {
          await api('delete-folder', { name: project.name });
          toast(`"${project.name}" deleted`);
          loadFolders();
        } catch {
          toast('delete failed');
          btn.disabled = false;
          btn.textContent = 'delete folder';
        }
      });

      // Delete individual files
      card.querySelectorAll('.delete-file-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const row  = btn.closest('.file-row');
          const path = row.dataset.path;
          const sha  = row.dataset.sha;
          const name = row.querySelector('.file-name').textContent;

          if (btn.dataset.confirm !== '1') {
            btn.textContent = 'sure?';
            btn.dataset.confirm = '1';
            setTimeout(() => { btn.textContent = 'delete'; btn.dataset.confirm = ''; }, 3000);
            return;
          }

          btn.disabled = true;
          btn.innerHTML = '<span class="spinner-inline"></span>';
          try {
            await api('delete-file', { path, sha });
            toast(`"${name}" deleted`);
            row.remove();
            // If no files left, show empty message
            const rows = card.querySelectorAll('.file-row');
            if (!rows.length) {
              card.querySelector('.file-rows').innerHTML = '<div class="empty-folder">no files</div>';
            }
          } catch {
            toast('delete failed');
            btn.disabled = false;
            btn.textContent = 'delete';
          }
        });
      });

      container.appendChild(card);
    });
  }

  // ── Load folders ──────────────────────────────────────────────────────────
  async function loadFolders() {
    document.getElementById('folders-list').innerHTML = '<div class="spinner"></div>';
    try {
      const data = await api('list');
      renderFolders(data.projects || []);
    } catch {
      document.getElementById('folders-list').innerHTML = '<div style="font-family:var(--mono);font-size:0.75rem;color:var(--muted);padding:3rem 0;text-align:center;">could not load folders</div>';
    }
  }

  document.getElementById('refresh-btn').addEventListener('click', loadFolders);

  // ── New folder modal ──────────────────────────────────────────────────────
  document.getElementById('new-folder-btn').addEventListener('click', () => {
    document.getElementById('modal-input').value = '';
    document.getElementById('modal-error').textContent = '';
    document.getElementById('modal').classList.add('open');
    document.getElementById('modal-input').focus();
  });

  document.getElementById('modal-cancel').addEventListener('click', () => {
    document.getElementById('modal').classList.remove('open');
  });

  document.getElementById('modal').addEventListener('click', e => {
    if (e.target === document.getElementById('modal')) {
      document.getElementById('modal').classList.remove('open');
    }
  });

  async function createFolder() {
    const name = document.getElementById('modal-input').value.trim();
    const errEl = document.getElementById('modal-error');
    const btn   = document.getElementById('modal-confirm');
    if (!name) { errEl.textContent = 'enter a name'; return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-inline"></span>';
    errEl.textContent = '';

    try {
      const data = await api('create-folder', { name });
      if (data.ok) {
        document.getElementById('modal').classList.remove('open');
        toast(`"${name}" created`);
        loadFolders();
      } else {
        errEl.textContent = data.error || 'failed';
      }
    } catch {
      errEl.textContent = 'error creating folder';
    } finally {
      btn.disabled = false;
      btn.textContent = 'create';
    }
  }

  document.getElementById('modal-confirm').addEventListener('click', createFolder);
  document.getElementById('modal-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') createFolder();
  });
</script>
</body>
</html>
