<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dropvlt — viewer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500&family=Geist+Mono:wght@300;400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fafaf9;
    --surface: #ffffff;
    --border: #e5e5e3;
    --border-strong: #d4d4d0;
    --text: #1a1a18;
    --muted: #8a8a85;
    --subtle: #f5f5f3;
    --mono: 'Geist Mono', monospace;
    --sans: 'Geist', sans-serif;
  }

  body { background: var(--bg); color: var(--text); font-family: var(--sans); font-weight: 400; min-height: 100vh; display: flex; flex-direction: column; -webkit-font-smoothing: antialiased; }

  header {
    padding: 1rem 2.5rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    gap: 0.75rem;
    flex-shrink: 0;
  }

  .logo { font-family: var(--mono); font-size: 0.9rem; color: var(--text); text-decoration: none; }
  .sep { color: var(--border-strong); font-weight: 300; }
  .bc-link { font-family: var(--mono); font-size: 0.85rem; color: var(--muted); text-decoration: none; }
  .bc-link:hover { color: var(--text); }
  .bc-current { font-family: var(--mono); font-size: 0.85rem; color: var(--text); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .btn {
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.05em;
    color: var(--muted);
    background: var(--subtle);
    border: 1px solid var(--border);
    padding: 0.4rem 0.85rem;
    border-radius: 6px;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.12s;
    white-space: nowrap;
  }

  .btn:hover { border-color: var(--border-strong); color: var(--text); background: var(--surface); }

  .viewer-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  #pdf-viewer { width: 100%; flex: 1; border: none; min-height: calc(100vh - 90px); display: none; }

  #image-viewer {
    flex: 1;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 3rem;
    background: var(--subtle);
    overflow: auto;
  }

  #image-viewer img {
    max-width: 100%;
    max-height: calc(100vh - 130px);
    object-fit: contain;
    border-radius: 8px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }

  #youtube-viewer {
    flex: 1;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 3rem;
    background: var(--subtle);
  }

  #youtube-viewer iframe {
    width: 100%;
    max-width: 920px;
    aspect-ratio: 16/9;
    border: none;
    border-radius: 10px;
    overflow: hidden;
  }

  #doc-viewer {
    flex: 1;
    display: none;
    padding: 3rem 2.5rem;
    max-width: 720px;
    margin: 0 auto;
    overflow-y: auto;
    width: 100%;
  }

  #unsupported {
    flex: 1;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 1.25rem;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 0.75rem;
    background: var(--subtle);
  }

  footer {
    padding: 0.75rem 2.5rem;
    border-top: 1px solid var(--border);
    background: rgba(250,250,249,0.9);
    backdrop-filter: blur(8px);
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<header>
  <a href="index.html" class="logo">dropvlt</a>
  <span class="sep">/</span>
  <a href="#" id="bc-folder" class="bc-link"></a>
  <span class="sep">/</span>
  <span class="bc-current" id="bc-file"></span>
  <a href="#" id="dl-btn" class="btn" download>↓ download</a>
</header>

<div class="viewer-wrap">
  <iframe id="pdf-viewer"></iframe>
  <div id="image-viewer"><img id="viewer-img" src="" alt=""></div>
  <div id="youtube-viewer"><iframe id="yt-frame" allowfullscreen></iframe></div>
  <div id="doc-viewer"></div>
  <div id="unsupported">
    <span>no preview available</span>
    <a href="#" id="dl-fallback" class="btn" download>↓ download file</a>
  </div>
</div>

<footer>
  <span id="footer-name"></span>
  <span id="footer-type"></span>
</footer>

<script>
  const params = new URLSearchParams(location.search);
  const folder = params.get('f') || '';
  const file = params.get('file') || '';
  const type = (params.get('type') || '').toLowerCase();
  const ext = file.split('.').pop().toLowerCase();
  const filePath = `projects/${folder}/${file}`;

  document.getElementById('bc-folder').textContent = folder;
  document.getElementById('bc-folder').href = `folder.html?f=${encodeURIComponent(folder)}`;
  document.getElementById('bc-file').textContent = file;
  document.getElementById('footer-name').textContent = file;
  document.getElementById('footer-type').textContent = type || ext;
  document.title = `dropvlt — ${file}`;

  const dlBtn = document.getElementById('dl-btn');
  dlBtn.href = filePath;
  dlBtn.setAttribute('download', file);
  document.getElementById('dl-fallback').href = filePath;
  document.getElementById('dl-fallback').setAttribute('download', file);

  const IMAGE_EXTS = ['jpg','jpeg','png','gif','webp','svg','avif'];

  if (ext === 'pdf' || type === 'pdf') {
    const el = document.getElementById('pdf-viewer');
    el.style.display = 'block';
    el.src = filePath;

  } else if (IMAGE_EXTS.includes(ext) || type === 'image') {
    const el = document.getElementById('image-viewer');
    el.style.display = 'flex';
    document.getElementById('viewer-img').src = filePath;

  } else if (type === 'youtube' || ext === 'youtube') {
    const el = document.getElementById('youtube-viewer');
    el.style.display = 'flex';
    dlBtn.style.display = 'none';
    fetch(filePath).then(r => r.text()).then(text => {
      const videoId = text.trim().match(/(?:v=|youtu\.be\/)([^&\n?#]+)/)?.[1];
      if (videoId) document.getElementById('yt-frame').src = `https://www.youtube.com/embed/${videoId}`;
    });

  } else if (['txt','md'].includes(ext) || type === 'doc') {
    const el = document.getElementById('doc-viewer');
    el.style.display = 'block';
    fetch(filePath).then(r => r.text()).then(text => {
      el.innerHTML = `<pre style="white-space:pre-wrap;font-family:var(--mono);font-size:0.8rem;line-height:1.9;color:var(--text);">${text.replace(/</g,'&lt;')}</pre>`;
    });

  } else {
    document.getElementById('unsupported').style.display = 'flex';
    dlBtn.style.display = 'none';
  }
</script>
</body>
</html>
