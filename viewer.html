<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>dropvlt — viewer</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500&family=Geist+Mono:wght@300;400&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg: #fafaf9;
  --surface: #ffffff;
  --border: #e5e5e3;
  --border-strong: #d4d4d0;
  --text: #1a1a18;
  --muted: #8a8a85;
  --subtle: #f5f5f3;
  --mono: 'Geist Mono', monospace;
  --sans: 'Geist', sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
}

header {
  padding: 1rem 2rem;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  align-items: center;
  gap: 0.75rem;
  flex-shrink: 0;
}

.logo {
  font-family: var(--mono);
  font-size: 0.9rem;
  text-decoration: none;
  color: var(--text);
}

.sep {
  color: var(--border-strong);
}

.bc-link,
.bc-current {
  font-family: var(--mono);
  font-size: 0.8rem;
}

.bc-link {
  color: var(--muted);
  text-decoration: none;
}

.bc-link:hover {
  color: var(--text);
}

.bc-current {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.btn {
  font-family: var(--mono);
  font-size: 0.7rem;
  background: var(--subtle);
  border: 1px solid var(--border);
  padding: 0.45rem 0.9rem;
  border-radius: 6px;
  text-decoration: none;
  color: var(--muted);
  transition: 0.15s;
}

.btn:hover {
  background: var(--surface);
  color: var(--text);
  border-color: var(--border-strong);
}

.viewer-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#pdf-viewer {
  width: 100%;
  flex: 1;
  border: none;
  display: none;
}

#image-viewer,
#youtube-viewer,
#unsupported {
  flex: 1;
  display: none;
  align-items: center;
  justify-content: center;
  background: var(--subtle);
}

#image-viewer {
  padding: 3rem;
}

#image-viewer img {
  max-width: 100%;
  max-height: calc(100vh - 130px);
  border-radius: 10px;
  object-fit: contain;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
}

#youtube-viewer iframe {
  width: 100%;
  max-width: 960px;
  aspect-ratio: 16/9;
  border: none;
  border-radius: 10px;
}

#doc-viewer {
  flex: 1;
  display: none;
  overflow: auto;
  padding: 2rem;
}

#doc-viewer pre {
  white-space: pre-wrap;
  word-break: break-word;
  line-height: 1.7;
  font-size: 0.82rem;
}

#unsupported {
  flex-direction: column;
  gap: 1rem;
  font-family: var(--mono);
  font-size: 0.8rem;
  color: var(--muted);
}

footer {
  padding: 0.8rem 2rem;
  border-top: 1px solid var(--border);
  background: rgba(250,250,249,0.9);
  font-family: var(--mono);
  font-size: 0.65rem;
  color: var(--muted);
  display: flex;
  justify-content: space-between;
}
</style>
</head>

<body>

<header>
  <a href="index.html" class="logo">dropvlt</a>

  <span class="sep">/</span>

  <a href="#" id="bc-folder" class="bc-link"></a>

  <span class="sep">/</span>

  <span class="bc-current" id="bc-file"></span>

  <a href="#" id="dl-btn" class="btn">↓ download</a>
</header>

<div class="viewer-wrap">

  <iframe id="pdf-viewer"></iframe>

  <div id="image-viewer">
    <img id="viewer-img" />
  </div>

  <div id="youtube-viewer">
    <iframe id="yt-frame" allowfullscreen></iframe>
  </div>

  <div id="doc-viewer"></div>

  <div id="unsupported">
    <span>no preview available</span>
    <a href="#" id="dl-fallback" class="btn">
      ↓ download file
    </a>
  </div>

</div>

<footer>
  <span id="footer-name"></span>
  <span id="footer-type"></span>
</footer>

<script>
const GITHUB_OWNER = 'dropvlt';
const GITHUB_REPO  = 'site';

const params = new URLSearchParams(location.search);

const folder = params.get('f') || '';
const file   = params.get('file') || '';
const type   = (params.get('type') || '').toLowerCase();

const ext =
  file.split('.').pop().toLowerCase();

const rawUrl =
  `/api/file?f=${encodeURIComponent(folder)}&file=${encodeURIComponent(file)}`;

document.getElementById('bc-folder').textContent = folder;

document.getElementById('bc-folder').href =
  `folder.html?f=${encodeURIComponent(folder)}`;

document.getElementById('bc-file').textContent = file;

document.getElementById('footer-name').textContent = file;

document.getElementById('footer-type').textContent =
  type || ext;

document.title = `dropvlt — ${file}`;

document.getElementById('dl-btn').href = rawUrl;
document.getElementById('dl-btn').download = file;

document.getElementById('dl-fallback').href = rawUrl;
document.getElementById('dl-fallback').download = file;

function escapeHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

const IMAGE_EXTS = [
  'jpg',
  'jpeg',
  'png',
  'gif',
  'webp',
  'svg',
  'avif'
];

const TEXT_EXTS = [
  'txt',
  'md',
  'html',
  'css',
  'js',
  'json',
  'xml',
  'yml',
  'yaml'
];

const OFFICE_EXTS = [
  'doc',
  'docx',
  'ppt',
  'pptx',
  'xls',
  'xlsx'
];

if (ext === 'pdf' || type === 'pdf') {

  const el =
    document.getElementById('pdf-viewer');

  el.style.display = 'block';
  el.src = rawUrl;

}

else if (
  IMAGE_EXTS.includes(ext) ||
  type === 'image'
) {

  const el =
    document.getElementById('image-viewer');

  el.style.display = 'flex';

  document.getElementById('viewer-img').src =
    rawUrl;

}

else if (
  type === 'youtube' ||
  ext === 'youtube'
) {

  const el =
    document.getElementById('youtube-viewer');

  el.style.display = 'flex';

  document.getElementById('dl-btn').style.display =
    'none';

  fetch(rawUrl)
    .then(r => r.text())
    .then(text => {

      const videoId =
        text
          .trim()
          .match(
            /(?:v=|youtu\.be\/)([^&\n?#]+)/
          )?.[1];

      if (videoId) {

        document.getElementById('yt-frame').src =
          `https://www.youtube.com/embed/${videoId}`;
      }
    });

}

else if (
  OFFICE_EXTS.includes(ext)
) {

  const el =
    document.getElementById('pdf-viewer');

  el.style.display = 'block';

  const absoluteUrl =
    `https://raw.githubusercontent.com/${GITHUB_OWNER}/${GITHUB_REPO}/main/projects/${folder}/${file}`;

  el.src =
    `https://view.officeapps.live.com/op/embed.aspx?src=${encodeURIComponent(absoluteUrl)}`;

}

else if (
  TEXT_EXTS.includes(ext) ||
  type === 'doc'
) {

  const el =
    document.getElementById('doc-viewer');

  el.style.display = 'block';

  fetch(rawUrl)
    .then(r => r.text())
    .then(text => {

      const mono =
        ext !== 'md';

      el.innerHTML = `
        <pre style="
          font-family:${mono ? 'var(--mono)' : 'var(--sans)'};
        ">${escapeHtml(text)}</pre>
      `;
    });

}

else {

  document.getElementById('unsupported')
    .style.display = 'flex';

  document.getElementById('dl-btn')
    .style.display = 'none';

}
</script>

</body>
</html>
