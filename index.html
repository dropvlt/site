<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dropvlt</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500&family=Geist+Mono:wght@300;400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fafaf9;
    --surface: #ffffff;
    --border: #e5e5e3;
    --border-strong: #d4d4d0;
    --text: #1a1a18;
    --muted: #8a8a85;
    --subtle: #f5f5f3;
    --accent: #1a1a18;
    --accent-hover: #333330;
    --mono: 'Geist Mono', monospace;
    --sans: 'Geist', sans-serif;
    --radius: 10px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-weight: 400;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  header {
    padding: 1.5rem 2.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .logo {
    font-family: var(--mono);
    font-size: 0.9rem;
    font-weight: 400;
    color: var(--text);
    text-decoration: none;
    letter-spacing: -0.01em;
  }

  .header-right {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--muted);
  }

  main {
    padding: 3rem 2.5rem;
    max-width: 1000px;
  }

  .page-title {
    font-size: 0.72rem;
    font-family: var(--mono);
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
  }

  .folder-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1rem;
  }

  .folder-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem 1.5rem;
    cursor: pointer;
    text-decoration: none;
    display: block;
    transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
  }

  .folder-card:hover {
    border-color: var(--border-strong);
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    transform: translateY(-1px);
  }

  .folder-card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }

  .folder-icon-wrap {
    width: 36px;
    height: 36px;
    background: var(--subtle);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .folder-icon-wrap svg {
    width: 18px;
    height: 18px;
    stroke: var(--muted);
    fill: none;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .folder-arrow svg {
    width: 14px;
    height: 14px;
    stroke: var(--border-strong);
    fill: none;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    transition: stroke 0.15s;
  }

  .folder-card:hover .folder-arrow svg { stroke: var(--muted); }

  .folder-name {
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 0.25rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .folder-meta {
    font-family: var(--mono);
    font-size: 0.68rem;
    color: var(--muted);
  }

  .empty {
    grid-column: 1/-1;
    padding: 5rem 0;
    text-align: center;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 0.75rem;
  }

  .loading {
    grid-column: 1/-1;
    padding: 3rem 0;
    text-align: center;
  }

  .spinner {
    width: 20px;
    height: 20px;
    border: 1.5px solid var(--border);
    border-top-color: var(--muted);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin: 0 auto;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  footer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 0.75rem 2.5rem;
    border-top: 1px solid var(--border);
    background: rgba(250,250,249,0.9);
    backdrop-filter: blur(8px);
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
  }
</style>
</head>
<body>

<header>
  <a href="index.html" class="logo">dropvlt</a>
  <div class="header-right" id="header-count"></div>
</header>

<main>
  <div class="page-title">projects</div>
  <div class="folder-grid" id="grid">
    <div class="loading"><div class="spinner"></div></div>
  </div>
</main>

<footer>
  <span>dropvlt.netlify.app</span>
  <span id="footer-date"></span>
</footer>

<script>
  document.getElementById('footer-date').textContent = new Date().toISOString().split('T')[0];

  fetch('manifest.json?v=' + Date.now())
    .then(r => r.json())
    .then(data => {
      const grid = document.getElementById('grid');
      const projects = data.projects || [];

      document.getElementById('header-count').textContent = projects.length + ' project' + (projects.length !== 1 ? 's' : '');

      if (projects.length === 0) {
        grid.innerHTML = '<div class="empty">no projects yet</div>';
        return;
      }

      grid.innerHTML = '';
      projects.forEach(p => {
        const a = document.createElement('a');
        a.className = 'folder-card';
        a.href = `folder.html?f=${encodeURIComponent(p.name)}`;
        a.innerHTML = `
          <div class="folder-card-top">
            <div class="folder-icon-wrap">
              <svg viewBox="0 0 24 24"><path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/></svg>
            </div>
            <div class="folder-arrow">
              <svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
            </div>
          </div>
          <div class="folder-name">${p.name}</div>
          <div class="folder-meta">${p.count} file${p.count !== 1 ? 's' : ''} · ${p.updated}</div>
        `;
        grid.appendChild(a);
      });
    })
    .catch(() => {
      document.getElementById('grid').innerHTML = '<div class="empty">could not load projects</div>';
    });
</script>
</body>
</html>
